     COOKIE NOTICE — copy this block verbatim into every page,
     directly before the scripts at the bottom of <body>.
     WP: register as a template part; or replace with a consent
     plugin (e.g. Complianz / CookieYes).
     Behaviour: js/cookie.js   Styling: css/cookie.css
     ============================================================ -->
<div class="cookie" id="cookie-notice" hidden>
  <div class="cookie__card">

    <!-- View: intro -->
    <div class="cookie__view" data-cookie-view="intro">
      <p class="cookie__text">
        We gebruiken cookies om de site goed te laten werken en, met jouw
        toestemming, om te meten hoe de site gebruikt wordt.
        <a href="/cookies/">Meer over cookies</a>.
      </p>
      <div class="cookie__actions">
        <button class="btn btn--primary btn--sm" type="button" data-cookie="accept-all">Alles accepteren</button>
        <button class="btn btn--outline btn--sm" type="button" data-cookie="customize">Aanpassen</button>
      </div>
    </div>

    <!-- View: settings -->
    <div class="cookie__view" data-cookie-view="settings" hidden>
      <p class="cookie__title">Cookievoorkeuren</p>
      <label class="cookie__option">
        <span class="cookie__option-text">
          <strong>Functioneel</strong>
          <small>Nodig om de site te laten werken. Altijd aan.</small>
        </span>
        <input type="checkbox" checked disabled aria-label="Functionele cookies (altijd aan)">
      </label>
      <label class="cookie__option">
        <span class="cookie__option-text">
          <strong>Analytisch</strong>
          <small>Anoniem meten hoe de site gebruikt wordt.</small>
        </span>
        <input type="checkbox" data-cookie-cat="analytisch" checked>
      </label>
      <label class="cookie__option">
        <span class="cookie__option-text">
          <strong>Marketing</strong>
          <small>Voor relevante advertenties en tracking.</small>
        </span>
        <input type="checkbox" data-cookie-cat="marketing">
      </label>
      <div class="cookie__actions">
        <button class="btn btn--primary btn--sm" type="button" data-cookie="save">Voorkeuren opslaan</button>
        <button class="btn btn--ghost btn--sm" type="button" data-cookie="accept-all">Alles accepteren</button>
      </div>
    </div>

  </div>
</div>
<!-- ===================== END COOKIE NOTICE ===================== -->
